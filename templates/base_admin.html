<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Administration{% endblock %} — ALUPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:0.75rem;">
            <a href="{{ url_for('admin_dashboard') }}">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="ALUPS" class="topbar-logo">
            </a>
            <span class="topbar-tag">Administration</span>
        </div>
        <div class="topbar-right">
            <a href="{{ url_for('admin_password') }}" class="btn btn-outline btn-sm">
                <i class="ti ti-lock"></i> Mot de passe
            </a>
            <a href="{{ url_for('admin_logout') }}" class="btn btn-outline btn-sm">
                <i class="ti ti-logout"></i> Déconnexion
            </a>
        </div>
    </div>

    <div class="admin-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}"><i class="ti ti-{% if category == 'danger' %}alert-circle{% else %}circle-check{% endif %}"></i> {{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
