{% extends "base.html" %}
{% block title %}Connexion admin{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card form-card">
        <div class="form-card-header">
            <i class="ti ti-shield-lock"></i> Connexion administrateur
        </div>
        <div class="form-card-body">
            <form method="POST">
                <div class="field">
                    <label class="label">Mot de passe</label>
                    <input type="password" class="input" name="password" required autofocus>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="ti ti-login"></i> Se connecter
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
