{% extends "base.html" %}
{% block title %}Connexion admin{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-box">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-shield-lock"></i> Connexion administrateur
            </div>
            <div class="card-body">
                <div class="form-group">
                    <form method="POST">
                        <div class="form-group">
                            <label class="label">Mot de passe</label>
                            <input type="password" class="input" name="password" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="bi bi-box-arrow-in-right"></i> Se connecter
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
