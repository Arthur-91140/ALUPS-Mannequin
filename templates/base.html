<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Suivi des mannequins{% endblock %} — ALUPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="ALUPS">
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div style="max-width:480px; margin:1rem auto; padding:0 1rem;">
        {% for category, message in messages %}
        <div class="alert-{{ category }}" style="padding:0.65rem 0.9rem; border-radius:8px; font-size:0.9rem; margin-bottom:0.5rem;
            {% if category == 'danger' %}background:#fef2f2; color:#b91c1c; border:1px solid #fecaca;
            {% elif category == 'success' %}background:#f0fdf4; color:#166534; border:1px solid #bbf7d0;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
