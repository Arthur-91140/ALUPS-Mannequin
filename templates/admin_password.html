{% extends "base_admin.html" %}
{% block title %}Changer le mot de passe{% endblock %}

{% block content %}
<div class="admin-bar">
    <div style="display:flex; align-items:center; gap:0.75rem;">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline btn-sm"><i class="ti ti-arrow-left"></i></a>
        <h1><i class="ti ti-lock"></i> Changer le mot de passe</h1>
    </div>
</div>

<div style="max-width:420px;">
    <div class="section">
        <form method="POST">
            <div class="field">
                <label class="label">Nouveau mot de passe</label>
                <input type="password" class="input" name="password" required minlength="4" autofocus>
            </div>
            <div class="field">
                <label class="label">Confirmer le mot de passe</label>
                <input type="password" class="input" name="confirm" required minlength="4">
            </div>
            <button type="submit" class="btn-submit"><i class="ti ti-check"></i> Enregistrer</button>
        </form>
    </div>
</div>
{% endblock %}
