{% extends "base.html" %}
{% block title %}Formulaire envoyé{% endblock %}

{% block content %}
<div class="success-card card shadow-sm">
    <div class="card-body py-5">
        <div class="success-icon mb-3">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2 class="h4 mb-3">Formulaire enregistré</h2>
        <p class="text-muted mb-4">
            Les informations ont bien été enregistrées.<br>
            Merci pour votre suivi.
        </p>
        <a href="{{ url_for('formulaire') }}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau formulaire
        </a>
    </div>
</div>
{% endblock %}
