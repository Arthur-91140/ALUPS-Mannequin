{% extends "base.html" %}
{% block title %}Configuration admin{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card form-card">
        <div class="form-card-header">
            <i class="ti ti-settings"></i> Création du compte administrateur
        </div>
        <div class="form-card-body">
            <p class="auth-hint">Première connexion : créez votre mot de passe administrateur.</p>
            <form method="POST">
                <div class="field">
                    <label class="label">Mot de passe</label>
                    <input type="password" class="input" name="password" required minlength="4" autofocus>
                </div>
                <div class="field">
                    <label class="label">Confirmer le mot de passe</label>
                    <input type="password" class="input" name="confirm" required minlength="4">
                </div>
                <button type="submit" class="btn-submit">
                    <i class="ti ti-check"></i> Créer le compte
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
