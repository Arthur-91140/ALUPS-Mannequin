{% extends "base.html" %}
{% block title %}Configuration admin{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-box">
        <article>
            <header><i class="ti ti-settings"></i> Création du compte administrateur</header>
            <p class="auth-hint">Première connexion : créez votre mot de passe administrateur.</p>
            <form method="POST">
                <label>
                    Mot de passe
                    <input type="password" name="password" required minlength="4" autofocus>
                </label>
                <label>
                    Confirmer le mot de passe
                    <input type="password" name="confirm" required minlength="4">
                </label>
                <button type="submit">
                    <i class="ti ti-check"></i> Créer le compte
                </button>
            </form>
        </article>
    </div>
</div>
{% endblock %}
