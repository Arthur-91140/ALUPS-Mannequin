{% extends "base.html" %}
{% block title %}Configuration admin{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-gear"></i> Création du compte administrateur
            </div>
            <div class="card-body p-4">
                <p class="text-muted" style="font-size:0.875rem;">
                    Première connexion : créez votre mot de passe administrateur.
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="password" name="password"
                               required minlength="4" autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="confirm" class="form-label">Confirmer le mot de passe</label>
                        <input type="password" class="form-control" id="confirm" name="confirm"
                               required minlength="4">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Créer le compte
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
