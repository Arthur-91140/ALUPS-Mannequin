{% extends "base.html" %}
{% block title %}Configuration admin{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-box">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-gear"></i> Création du compte administrateur
            </div>
            <div class="card-body">
                <p style="font-size:0.875rem; color:var(--text-secondary); margin-bottom:1rem;">
                    Première connexion : créez votre mot de passe administrateur.
                </p>
                <form method="POST">
                    <div class="form-group">
                        <label class="label">Mot de passe</label>
                        <input type="password" class="input" name="password" required minlength="4" autofocus>
                    </div>
                    <div class="form-group">
                        <label class="label">Confirmer le mot de passe</label>
                        <input type="password" class="input" name="confirm" required minlength="4">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="bi bi-check-lg"></i> Créer le compte
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
